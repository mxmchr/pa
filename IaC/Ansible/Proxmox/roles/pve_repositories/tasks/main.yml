---
- name: Remove old Proxmox/Debian repository list files to avoid duplicates
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/pve-enterprise.list
    - /etc/apt/sources.list.d/pve-enterprise.sources
    - /etc/apt/sources.list.d/pve-no-subscription.list
    - /etc/apt/sources.list.d/ceph.list
    - /etc/apt/sources.list.d/ceph.sources
    - /etc/apt/sources.list.d/debian.sources

- name: Disable legacy /etc/apt/sources.list to avoid Bookworm/Trixie mix
  ansible.builtin.copy:
    dest: /etc/apt/sources.list
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible.
      # Debian repositories are configured in /etc/apt/sources.list.d/debian.sources.

- name: Configure Debian Trixie repositories
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/debian.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://deb.debian.org/debian/
      Suites: trixie trixie-updates
      Components: main contrib non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

      Types: deb
      URIs: http://security.debian.org/debian-security/
      Suites: trixie-security
      Components: main contrib non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

- name: Configure Proxmox VE 9 no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/proxmox.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: trixie
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg

- name: Configure Ceph Squid no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/ceph-squid
      Suites: trixie
      Components: no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true

- name: Full upgrade packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - htop
      - jq
      - chrony
      - python3-pip
    state: present

- name: Ensure chrony is enabled and started
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true
