---
- name: Ensure APT keyrings directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Disable Proxmox enterprise repository if present
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    regexp: '^Enabled:'
    line: 'Enabled: false'
    create: false
  failed_when: false

- name: Disable legacy Proxmox enterprise list repository if present
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    regexp: '^deb '
    replace: '# deb '
  failed_when: false

- name: Configure Debian Trixie repositories
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/debian.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://deb.debian.org/debian/
      Suites: trixie trixie-updates
      Components: main contrib non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg

      Types: deb
      URIs: http://security.debian.org/debian-security/
      Suites: trixie-security
      Components: main contrib non-free-firmware
      Signed-By: /usr/share/keyrings/debian-archive-keyring.gpg
  notify: apt_update

- name: Configure Proxmox VE 9 no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: trixie
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
  notify: apt_update

- name: Configure Ceph Squid no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/ceph-squid
      Suites: trixie
      Components: no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
  notify: apt_update

- name: Disable legacy /etc/apt/sources.list entries to avoid duplicates
  ansible.builtin.replace:
    path: /etc/apt/sources.list
    regexp: '^deb '
    replace: '# deb '
  failed_when: false

- name: Flush handlers before package operations
  ansible.builtin.meta: flush_handlers

- name: Full upgrade Proxmox packages
  ansible.builtin.apt:
    upgrade: full
    autoremove: true
    autoclean: true
    update_cache: true

- name: Install baseline packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - htop
      - jq
      - chrony
    state: present
    update_cache: false

- name: Ensure chrony is enabled and started
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true
