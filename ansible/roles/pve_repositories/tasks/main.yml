---
- name: Disable Proxmox enterprise Deb822 repository if present
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list.d/pve-enterprise.sources
    regexp: '^Enabled:'
    line: 'Enabled: no'
    create: false
  failed_when: false
  notify: apt_update

- name: Disable legacy Proxmox enterprise list repository if present
  ansible.builtin.replace:
    path: /etc/apt/sources.list.d/pve-enterprise.list
    regexp: '^deb '
    replace: '# deb '
  failed_when: false
  notify: apt_update

- name: Configure Proxmox VE no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/proxmox.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: trixie
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
  notify: apt_update

- name: Configure Ceph Squid no-subscription repository
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/ceph.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/ceph-squid
      Suites: trixie
      Components: no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
  notify: apt_update

- name: Flush handlers before package operations
  ansible.builtin.meta: flush_handlers

- name: Full upgrade Proxmox packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true
    autoclean: true
    update_cache: true
    force_apt_get: true