[defaults]
inventory = inventory/production/hosts.yml
roles_path = roles
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
interpreter_python = auto_silent

[privilege_escalation]
become = false

[ssh_connection]
pipelining = True
ssh_args = -o ServerAliveInterval=15 -o ServerAliveCountMax=10 -o ControlMaster=auto -o ControlPersist=60s
